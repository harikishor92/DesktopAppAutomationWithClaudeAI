# ============================================================
#  POS Automation Framework — Configuration
# ============================================================

# Path to the POS application executable
appPath=C:\\Program Files (x86)\\POS.exe

# WinAppDriver server URL (default port 4723)
winAppDriverUrl=http://127.0.0.1:4723

# Path to WinAppDriver.exe — auto-launched as Administrator if not already running
winAppDriverExePath=C:\\Program Files (x86)\\Windows Application Driver\\WinAppDriver.exe

# Implicit wait (in seconds)
implicitWait=15

# Fragment that must appear in the main window title for launch validation
# Adjust this if the real window title differs (inspect with WinAppDriver or Accessibility Insights)
appWindowTitleFragment=Home
#appWindowTitleFragment=Alberta
# Window title of the FrmLog login screen (returned by WinAppDriver getTitle())
loginWindowTitle=Alberta POS Login
# Title returned by WinAppDriver's getTitle() when the Home Page is the active view
# AlbertaPOS shows 'Home' as the form/document title when attached via appTopLevelWindow
homePageTitleFragment=Home
#homePageTitleFragment=Alberta

# Seconds WinAppDriver waits for the app's first window after launch (ms:waitForAppLaunch)
# AlbertaPOS typically shows the login screen within 60 s; increase further if startup is slower
appLaunchWaitSeconds=90

# POS application login credentials
posUsername=111
posPassword=1111

# Transaction test — folder where receipt files are saved
receiptsFolder=D:\\POSAutomationWithClaude\\Receipts

# ============================================================
#  Enterprise Framework Configuration
# ============================================================

# ── Environment / Execution ──────────────────────────────────
environment=PROD
executionMode=local
# Set to true to kill WinAppDriver after suite completes; false keeps it alive for next run
stopWinAppDriverAfterSuite=false

# ── Admin / UAC / WinAppDriver lifecycle ─────────────────────
# Fail the suite immediately if not running as Administrator (set true in CI where pipeline is always elevated)
requireAdminPrivileges=false
# Seconds to wait for WinAppDriver auto-start before falling back to manual-wait
winAppDriverStartTimeoutSeconds=30
# Number of HTTP /status retries per health check call
winAppDriverHealthCheckRetries=3
# true = dedicated automation VM with UAC disabled; enables stricter launch checks
automationVmMode=false

# ── Reporting ────────────────────────────────────────────────
# Base folder for Extent HTML reports (timestamp subfolder created automatically)
reportPath=target/reports
# Folder for failure screenshots (Robot-based full-desktop capture)
screenshotPath=target/screenshots

# ── Login optimisation ───────────────────────────────────────
# FrmLog uses a numpad-only UI — no UIAutomation Edit fields exist.
# true = skip Strategy 1 (loginViaUiAutomation) in LoginPage, saving ~2 s per login.
loginSkipEditStrategy=true

# ── Retry ────────────────────────────────────────────────────
# Number of times a failed test is automatically retried (0 to disable)
retryCount=2

# ── Test Data (Apache POI / Excel) ───────────────────────────
# Path to the Excel data file (relative to project root)
excelFilePath=src/test/resources/testdata/POSTestData.xlsx

# ── Database (MySQL) ─────────────────────────────────────────
dbDriver=com.mysql.cj.jdbc.Driver
dbUrl=jdbc:mysql://localhost:3306/albertapos_db?useSSL=false&serverTimezone=UTC
dbUsername=pos_user
dbPassword=pos_password
